<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pebble TDS Control</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5fbef;
      color: #132525;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        linear-gradient(135deg, rgba(104, 218, 31, 0.22), rgba(255, 255, 255, 0.42) 42%, rgba(174, 202, 105, 0.24)),
        #f5fbef;
    }
    main {
      width: min(560px, 100%);
      background: rgba(255, 255, 255, 0.58);
      border: 1px solid rgba(255, 255, 255, 0.66);
      border-radius: 20px;
      box-shadow: 0 18px 52px rgba(76, 124, 9, 0.16);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      padding: 28px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 30px;
      line-height: 1.15;
      letter-spacing: 0;
    }
    p {
      margin: 0 0 22px;
      color: #355051;
      font-size: 15px;
      line-height: 1.45;
    }
    form {
      display: grid;
      gap: 14px;
    }
    label {
      display: grid;
      gap: 8px;
      font-size: 14px;
      font-weight: 700;
      color: #355051;
    }
    input {
      width: 100%;
      min-height: 56px;
      border: 1px solid rgba(76, 124, 9, 0.18);
      border-radius: 16px;
      padding: 0 14px;
      font-size: 24px;
      color: #132525;
      background: rgba(255, 255, 255, 0.72);
      outline: none;
    }
    input:focus {
      border-color: rgba(76, 124, 9, 0.44);
      box-shadow: 0 0 0 4px rgba(104, 218, 31, 0.16);
    }
    button {
      min-height: 52px;
      border: 0;
      border-radius: 999px;
      font-size: 17px;
      font-weight: 800;
      color: #ffffff;
      background: #4c7c09;
      box-shadow: 0 10px 22px rgba(76, 124, 9, 0.22);
      cursor: pointer;
    }
    button:disabled {
      cursor: progress;
      opacity: 0.7;
    }
    output {
      display: block;
      min-height: 26px;
      margin-top: 18px;
      font-size: 15px;
      color: #355051;
    }
    .ok {
      color: #4c7c09;
      font-weight: 800;
    }
    .error {
      color: #b3261e;
      font-weight: 800;
    }
  </style>
</head>
<body>
  <main>
    <h1>Pebble TDS Control</h1>
    <p>Send one TDS result to the paired phone.</p>
    <form id="tds-form">
      <label for="tds">TDS value, ppm
        <input id="tds" name="tds" type="number" inputmode="numeric" min="0" max="2000" step="1" placeholder="123" required>
      </label>
      <button id="submit" type="submit">Send report to phone</button>
    </form>
    <output id="status">Connect this computer to WiFi Pebble-TDS before submitting.</output>
  </main>
  <script>
    const endpoint = "http://192.168.4.1/tds";
    const form = document.getElementById("tds-form");
    const input = document.getElementById("tds");
    const submit = document.getElementById("submit");
    const status = document.getElementById("status");
    let isSubmitting = false;

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      if (isSubmitting) return;

      const value = input.value.trim();
      isSubmitting = true;
      submit.disabled = true;
      status.className = "";
      status.textContent = "Sending...";

      try {
        const response = await fetch(endpoint, {
          method: "POST",
          headers: {"Content-Type": "application/x-www-form-urlencoded"},
          body: new URLSearchParams({
            tds: value,
            tds_timestamp: Math.floor(Date.now() / 1000).toString()
          })
        });
        const result = await response.json();
        if (!response.ok || !result.ok) {
          throw new Error(result.error || "Send failed");
        }
        status.className = "ok";
        status.textContent = `Sent ${result.tds_number} ppm. Phone connected: ${result.ble_connected ? "yes" : "no"}.`;
      } catch (error) {
        status.className = "error";
        status.textContent = `${error.message}. Check WiFi Pebble-TDS and http://192.168.4.1/.`;
      } finally {
        isSubmitting = false;
        submit.disabled = false;
      }
    });
  </script>
</body>
</html>
